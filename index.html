<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InventoryPro Cloud</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_AUTH_DOMAIN",
  projectId: "ISI_PROJECT_ID",
  storageBucket: "ISI_STORAGE",
  messagingSenderId: "ISI_SENDER",
  appId: "ISI_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const { useState, useEffect } = React;

const App = () => {

  // ================= STATE =================
  const [masterBarang, setMasterBarang] = useState([]);
  const [transaksiMasuk, setTransaksiMasuk] = useState([]);
  const [transaksiKeluar, setTransaksiKeluar] = useState([]);

  const [formMaster, setFormMaster] = useState({ nama: '', kategori: '' });
  const [activeTab, setActiveTab] = useState('dashboard');

  // ================= LOAD CLOUD =================
  useEffect(() => {
    const unsub = db.collection("masterBarang")
      .onSnapshot(snap => {
        setMasterBarang(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    return () => unsub();
  }, []);

  useEffect(() => {
    const unsub = db.collection("transaksiMasuk")
      .onSnapshot(snap => {
        setTransaksiMasuk(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    return () => unsub();
  }, []);

  useEffect(() => {
    const unsub = db.collection("transaksiKeluar")
      .onSnapshot(snap => {
        setTransaksiKeluar(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    return () => unsub();
  }, []);

  // ================= MASTER =================
  const handleMasterSubmit = async (e) => {
    e.preventDefault();

    if (!formMaster.nama) return alert("Nama wajib");

    await db.collection("masterBarang").add(formMaster);

    setFormMaster({ nama: '', kategori: '' });
  };

  // ================= TRANSAKSI =================
  const tambahMasuk = async (b) => {
    await db.collection("transaksiMasuk").add({
      idBarang: b.id,
      namaBarang: b.nama,
      kategori: b.kategori,
      jumlah: 1,
      tanggal: new Date().toISOString()
    });
  };

  const tambahKeluar = async (b) => {
    await db.collection("transaksiKeluar").add({
      idBarang: b.id,
      namaBarang: b.nama,
      kategori: b.kategori,
      jumlah: 1,
      tanggal: new Date().toISOString()
    });
  };

  const hapus = async (id, tipe) => {
    await db.collection(tipe).doc(id).delete();
  };

  // ================= HITUNG STOK =================
  const getStok = (id) => {
    const masuk = transaksiMasuk
      .filter(x => x.idBarang === id)
      .reduce((a,b)=>a+b.jumlah,0);

    const keluar = transaksiKeluar
      .filter(x => x.idBarang === id)
      .reduce((a,b)=>a+b.jumlah,0);

    return masuk - keluar;
  };

  return (
    <div className="p-6 space-y-6">

      <h1 className="text-3xl font-bold text-blue-600">
        InventoryPro ☁️ Cloud
      </h1>

      {/* NAV */}
      <div className="space-x-2">
        <button onClick={()=>setActiveTab('dashboard')} className="px-3 py-2 bg-blue-500 text-white rounded">Dashboard</button>
        <button onClick={()=>setActiveTab('master')} className="px-3 py-2 bg-gray-300 rounded">Master</button>
      </div>

      {/* DASHBOARD */}
      {activeTab === 'dashboard' && (
        <div className="bg-white p-4 rounded shadow">
          <p>Total Barang: {masterBarang.length}</p>
          <p>Total Masuk: {transaksiMasuk.reduce((a,b)=>a+b.jumlah,0)}</p>
          <p>Total Keluar: {transaksiKeluar.reduce((a,b)=>a+b.jumlah,0)}</p>
        </div>
      )}

      {/* MASTER */}
      {activeTab === 'master' && (
        <div className="space-y-4">

          <form onSubmit={handleMasterSubmit} className="bg-white p-4 rounded shadow">
            <input
              value={formMaster.nama}
              onChange={e=>setFormMaster({...formMaster, nama:e.target.value})}
              placeholder="Nama"
              className="border p-2 mr-2"
            />
            <input
              value={formMaster.kategori}
              onChange={e=>setFormMaster({...formMaster, kategori:e.target.value})}
              placeholder="Kategori"
              className="border p-2 mr-2"
            />
            <button className="bg-blue-500 text-white px-3 py-2 rounded">
              Simpan
            </button>
          </form>

          <div className="bg-white p-4 rounded shadow">
            {masterBarang.map(b => (
              <div key={b.id} className="flex justify-between border-b py-2">
                <div>
                  <b>{b.nama}</b>
                  <div className="text-sm text-gray-500">
                    Stok: {getStok(b.id)}
                  </div>
                </div>

                <div className="space-x-2">
                  <button onClick={()=>tambahMasuk(b)} className="bg-green-500 text-white px-2 py-1 rounded">Masuk</button>
                  <button onClick={()=>tambahKeluar(b)} className="bg-orange-500 text-white px-2 py-1 rounded">Keluar</button>
                </div>
              </div>
            ))}
          </div>

          <div className="grid md:grid-cols-2 gap-4">

            <div className="bg-white p-4 rounded shadow">
              <h2 className="font-bold">Masuk</h2>
              {transaksiMasuk.map(t => (
                <div key={t.id} className="flex justify-between border-b py-1">
                  <span>{t.namaBarang}</span>
                  <button onClick={()=>hapus(t.id,"transaksiMasuk")} className="text-red-500">x</button>
                </div>
              ))}
            </div>

            <div className="bg-white p-4 rounded shadow">
              <h2 className="font-bold">Keluar</h2>
              {transaksiKeluar.map(t => (
                <div key={t.id} className="flex justify-between border-b py-1">
                  <span>{t.namaBarang}</span>
                  <button onClick={()=>hapus(t.id,"transaksiKeluar")} className="text-red-500">x</button>
                </div>
              ))}
            </div>

          </div>

        </div>
      )}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
