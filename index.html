<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GudangSmart - Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .active-nav { background-color: #2563eb; color: white; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .table-container { max-height: calc(100vh - 300px); overflow-y: auto; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        @media print {
            aside, header, .no-print, button, select { display: none !important; }
            main { padding: 0 !important; width: 100% !important; }
            .bg-white { box-shadow: none !important; border: none !important; }
            .table-container { max-height: none !important; overflow: visible !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            // --- State ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [categories, setCategories] = useState(['Alat Tulis Kantor', 'Plastik', 'PHP', 'Alat Kebersihan']);
            
            const [masterBarang, setMasterBarang] = useState([
                { id: 1, nama: 'Kertas A4', kategori: 'Alat Tulis Kantor' },
                { id: 2, nama: 'Kantong Kresek L', kategori: 'Plastik' },
                { id: 3, nama: 'Sapu Ijuk', kategori: 'Alat Kebersihan' }
            ]);
            
            const [transaksiMasuk, setTransaksiMasuk] = useState([]);
            const [transaksiKeluar, setTransaksiKeluar] = useState([]);
            
            const [newCategory, setNewCategory] = useState('');
            const [formMaster, setFormMaster] = useState({ nama: '', kategori: 'Alat Tulis Kantor' });
            const [importCategory, setImportCategory] = useState('Alat Tulis Kantor');
            
            // Edit State Master
            const [editingItem, setEditingItem] = useState(null);
            const [editNameValue, setEditNameValue] = useState('');

            // Edit State Kategori
            const [editingCategory, setEditingCategory] = useState(null);
            const [editCategoryValue, setEditCategoryValue] = useState('');

            // Edit State Transaksi
            const [editingTransaksi, setEditingTransaksi] = useState(null);

            // State Riwayat
            const [selectedRuangan, setSelectedRuangan] = useState('');
            const [selectedBarangId, setSelectedBarangId] = useState('');

            // State Tren Harga
            const [priceTrendKategori, setPriceTrendKategori] = useState('');
            const [priceTrendBarangId, setPriceTrendBarangId] = useState('');

            const today = new Date().toISOString().split('T')[0];
            const currentYear = new Date().getFullYear();

            // Multi-Item Input State
            const [multiInputMasuk, setMultiInputMasuk] = useState([{ idBarang: '', jumlah: '', harga: '', kategori: '' }]);
            const [multiInputKeluar, setMultiInputKeluar] = useState([{ idBarang: '', jumlah: '', kategori: '' }]);
            const [globalTanggal, setGlobalTanggal] = useState(today);
            const [globalVendor, setGlobalVendor] = useState('');
            const [globalTujuan, setGlobalTujuan] = useState('');

            const chartRef = useRef(null);
            const priceChartRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, masterBarang, categories, editingItem, editingCategory, selectedRuangan, selectedBarangId, multiInputMasuk, multiInputKeluar, transaksiMasuk, transaksiKeluar, editingTransaksi, priceTrendKategori, priceTrendBarangId]);

            // Database Gabungan untuk menu Edit
            const allTransactions = useMemo(() => {
                const m = transaksiMasuk.map(t => ({ ...t, tipe: 'MASUK' }));
                const k = transaksiKeluar.map(t => ({ ...t, tipe: 'KELUAR' }));
                return [...m, ...k].sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            }, [transaksiMasuk, transaksiKeluar]);

            // Riwayat Per Ruangan
            const daftarRuangan = useMemo(() => {
                const uniqueRuangan = [...new Set(transaksiKeluar.map(t => t.tujuan).filter(t => t))];
                return uniqueRuangan.sort();
            }, [transaksiKeluar]);

            const detailRiwayatRuangan = useMemo(() => {
                if (!selectedRuangan) return [];
                return transaksiKeluar
                    .filter(t => t.tujuan === selectedRuangan)
                    .sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            }, [selectedRuangan, transaksiKeluar]);

            // Riwayat Per Barang (Kartu Stok)
            const detailRiwayatBarang = useMemo(() => {
                if (!selectedBarangId) return [];
                const id = parseInt(selectedBarangId);
                const masuk = transaksiMasuk.filter(t => t.idBarang === id).map(t => ({ ...t, jenis: 'MASUK' }));
                const keluar = transaksiKeluar.filter(t => t.idBarang === id).map(t => ({ ...t, jenis: 'KELUAR' }));
                return [...masuk, ...keluar].sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            }, [selectedBarangId, transaksiMasuk, transaksiKeluar]);

            const infoBarangTerpilih = useMemo(() => {
                if (!selectedBarangId) return null;
                const barang = masterBarang.find(b => b.id === parseInt(selectedBarangId));
                const riwayat = detailRiwayatBarang;
                const tMasuk = riwayat.filter(r => r.jenis === 'MASUK').reduce((s, r) => s + r.jumlah, 0);
                const tKeluar = riwayat.filter(r => r.jenis === 'KELUAR').reduce((s, r) => s + r.jumlah, 0);
                return { ...barang, tMasuk, tKeluar, stok: tMasuk - tKeluar };
            }, [selectedBarangId, masterBarang, detailRiwayatBarang]);

            // Perhitungan Tren Harga
            const dataTrenHarga = useMemo(() => {
                if (!priceTrendBarangId) return [];
                return transaksiMasuk
                    .filter(t => t.idBarang === parseInt(priceTrendBarangId))
                    .sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal))
                    .map(t => ({
                        tanggal: t.tanggal,
                        harga: t.harga
                    }));
            }, [priceTrendBarangId, transaksiMasuk]);

            const statistikHarga = useMemo(() => {
                if (dataTrenHarga.length === 0) return null;
                const hargas = dataTrenHarga.map(d => d.harga);
                return {
                    terakhir: hargas[hargas.length - 1],
                    tertinggi: Math.max(...hargas),
                    terendah: Math.min(...hargas)
                };
            }, [dataTrenHarga]);

            // Perhitungan Total per Kategori untuk Dashboard
            const summaryKategori = useMemo(() => {
                return categories.map(cat => {
                    const totalHarga = transaksiMasuk
                        .filter(t => t.kategori === cat)
                        .reduce((acc, curr) => acc + (curr.jumlah * (curr.harga || 0)), 0);
                    const totalUnit = transaksiMasuk
                        .filter(t => t.kategori === cat)
                        .reduce((acc, curr) => acc + curr.jumlah, 0);
                    return { kategori: cat, totalHarga, totalUnit };
                });
            }, [categories, transaksiMasuk]);

            // Perhitungan Persentase Anggaran
            const budgetAnalysis = useMemo(() => {
                const grandTotal = summaryKategori.reduce((acc, curr) => acc + curr.totalHarga, 0);
                return summaryKategori.map(item => ({
                    ...item,
                    persen: grandTotal > 0 ? ((item.totalHarga / grandTotal) * 100).toFixed(1) : 0
                })).sort((a, b) => b.totalHarga - a.totalHarga);
            }, [summaryKategori]);

            // Helper Export Excel
            const exportToExcel = (data, fileName) => {
                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
                XLSX.writeFile(workbook, `${fileName}.xlsx`);
            };

            const printReport = () => {
                window.print();
            };

            // Dashboard Chart
            useEffect(() => {
                if (activeTab === 'dashboard') {
                    const ctx = document.getElementById('purchaseChart');
                    if (!ctx) return;
                    const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#64748b'];
                    const datasets = categories.map((cat, index) => {
                        const monthlyData = new Array(12).fill(0);
                        transaksiMasuk
                            .filter(t => t.kategori === cat && new Date(t.tanggal).getFullYear() === currentYear)
                            .forEach(t => {
                                const month = new Date(t.tanggal).getMonth();
                                monthlyData[month] += (t.jumlah * (t.harga || 0));
                            });
                        return {
                            label: cat,
                            data: monthlyData,
                            borderColor: colors[index % colors.length],
                            backgroundColor: colors[index % colors.length] + '20',
                            borderWidth: 3,
                            tension: 0.3,
                            fill: false,
                            pointRadius: 4
                        };
                    });
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: { labels, datasets },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: { y: { beginAtZero: true, ticks: { callback: (v) => 'Rp ' + v.toLocaleString('id-ID') } } }
                        }
                    });
                }
            }, [activeTab, transaksiMasuk, categories]);

            // Price Trend Chart
            useEffect(() => {
                if (activeTab === 'tren-harga' && dataTrenHarga.length > 0) {
                    const ctx = document.getElementById('priceTrendChart');
                    if (!ctx) return;
                    
                    if (priceChartRef.current) priceChartRef.current.destroy();
                    
                    priceChartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dataTrenHarga.map(d => new Date(d.tanggal).toLocaleDateString('id-ID')),
                            datasets: [{
                                label: 'Harga Beli Satuan (Rp)',
                                data: dataTrenHarga.map(d => d.harga),
                                borderColor: '#2563eb',
                                backgroundColor: '#2563eb20',
                                borderWidth: 4,
                                tension: 0.2,
                                fill: true,
                                pointRadius: 6,
                                pointHoverRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false }
                            },
                            scales: {
                                y: {
                                    beginAtZero: false,
                                    ticks: { callback: (v) => 'Rp ' + v.toLocaleString('id-ID') }
                                }
                            }
                        }
                    });
                }
            }, [activeTab, dataTrenHarga]);

            // Handlers
            const handleAddRowMasuk = () => setMultiInputMasuk([...multiInputMasuk, { idBarang: '', jumlah: '', harga: '', kategori: '' }]);
            const handleRemoveRowMasuk = (index) => setMultiInputMasuk(multiInputMasuk.filter((_, i) => i !== index));
            
            const handleAddRowKeluar = () => setMultiInputKeluar([...multiInputKeluar, { idBarang: '', jumlah: '', kategori: '' }]);
            const handleRemoveRowKeluar = (index) => setMultiInputKeluar(multiInputKeluar.filter((_, i) => i !== index));

            const saveMultiMasuk = (e) => {
                e.preventDefault();
                const newEntries = [];
                for (let item of multiInputMasuk) {
                    if (!item.idBarang || !item.jumlah || !item.harga) continue;
                    const b = masterBarang.find(x => x.id === parseInt(item.idBarang));
                    newEntries.push({
                        id: Date.now() + Math.random(),
                        tanggal: globalTanggal,
                        vendor: globalVendor,
                        idBarang: b.id,
                        namaBarang: b.nama,
                        kategori: b.kategori,
                        jumlah: Number(item.jumlah),
                        harga: Number(item.harga),
                        satuan: 'Pcs'
                    });
                }
                if (newEntries.length === 0) return alert("Mohon isi minimal satu barang dengan lengkap.");
                setTransaksiMasuk([...transaksiMasuk, ...newEntries]);
                setMultiInputMasuk([{ idBarang: '', jumlah: '', harga: '', kategori: '' }]);
                setGlobalVendor('');
                alert("Berhasil menyimpan " + newEntries.length + " item.");
            };

            const saveMultiKeluar = (e) => {
                e.preventDefault();
                const newEntries = [];
                for (let item of multiInputKeluar) {
                    if (!item.idBarang || !item.jumlah) continue;
                    const b = masterBarang.find(x => x.id === parseInt(item.idBarang));
                    newEntries.push({
                        id: Date.now() + Math.random(),
                        tanggal: globalTanggal,
                        tujuan: globalTujuan,
                        idBarang: b.id,
                        namaBarang: b.nama,
                        kategori: b.kategori,
                        jumlah: Number(item.jumlah),
                        satuan: 'Pcs'
                    });
                }
                if (newEntries.length === 0) return alert("Mohon isi minimal satu barang dengan lengkap.");
                setTransaksiKeluar([...transaksiKeluar, ...newEntries]);
                setMultiInputKeluar([{ idBarang: '', jumlah: '', kategori: '' }]);
                setGlobalTujuan('');
                alert("Berhasil menyimpan " + newEntries.length + " item.");
            };

            const getStokInfo = () => {
                return masterBarang.map(brg => {
                    const tM = transaksiMasuk.filter(t => t.idBarang === brg.id).reduce((s, t) => s + t.jumlah, 0);
                    const tK = transaksiKeluar.filter(t => t.idBarang === brg.id).reduce((s, t) => s + t.jumlah, 0);
                    return { ...brg, totalMasuk: tM, totalKeluar: tK, stokAkhir: tM - tK };
                });
            };

            const handleUpdateItem = () => {
                setMasterBarang(prev => prev.map(i => i.id === editingItem.id ? { ...i, nama: editNameValue } : i));
                setEditingItem(null);
            };

            const handleUpdateCategory = () => {
                if (!editCategoryValue || categories.includes(editCategoryValue)) {
                    if (categories.includes(editCategoryValue) && editCategoryValue !== editingCategory) {
                        alert("Nama kategori sudah ada.");
                    }
                    setEditingCategory(null);
                    return;
                }
                
                const oldCategoryName = editingCategory;
                const newCategoryName = editCategoryValue;

                setCategories(prev => prev.map(c => c === oldCategoryName ? newCategoryName : c));
                setMasterBarang(prev => prev.map(b => b.kategori === oldCategoryName ? { ...b, kategori: newCategoryName } : b));
                setTransaksiMasuk(prev => prev.map(t => t.kategori === oldCategoryName ? { ...t, kategori: newCategoryName } : t));
                setTransaksiKeluar(prev => prev.map(t => t.kategori === oldCategoryName ? { ...t, kategori: newCategoryName } : t));
                
                setEditingCategory(null);
                setEditCategoryValue('');
            };

            const handleDeleteTransaksi = (id, tipe) => {
                if (tipe === 'MASUK') {
                    setTransaksiMasuk(transaksiMasuk.filter(t => t.id !== id));
                } else {
                    setTransaksiKeluar(transaksiKeluar.filter(t => t.id !== id));
                }
            };

            const handleUpdateTransaksi = (e) => {
                e.preventDefault();
                if (editingTransaksi.tipe === 'MASUK') {
                    setTransaksiMasuk(transaksiMasuk.map(t => t.id === editingTransaksi.id ? editingTransaksi : t));
                } else {
                    setTransaksiKeluar(transaksiKeluar.map(t => t.id === editingTransaksi.id ? editingTransaksi : t));
                }
                setEditingTransaksi(null);
            };

            // Import Handler
            const handleImportExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    const newItems = [];
                    jsonData.forEach((row) => {
                        const namaBarang = row[0]?.toString().trim();
                        if (namaBarang && namaBarang !== "" && !masterBarang.some(b => b.nama.toLowerCase() === namaBarang.toLowerCase())) {
                            newItems.push({
                                id: Date.now() + Math.random(),
                                nama: namaBarang,
                                kategori: importCategory
                            });
                        }
                    });

                    if (newItems.length > 0) {
                        setMasterBarang([...masterBarang, ...newItems]);
                        alert(`Berhasil mengimpor ${newItems.length} barang ke kategori ${importCategory}`);
                    } else {
                        alert("Tidak ada barang baru yang ditemukan atau format tidak sesuai.");
                    }
                    e.target.value = null; // Reset input
                };
                reader.readAsArrayBuffer(file);
            };

            const SidebarItem = ({ id, icon, label }) => (
                <button onClick={() => setActiveTab(id)} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === id ? 'active-nav shadow-lg' : 'text-gray-500 hover:bg-gray-100'}`}>
                    <i data-lucide={icon} className="w-5 h-5"></i>
                    <span className="font-medium text-sm">{label}</span>
                </button>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-72 bg-white border-r flex flex-col p-6 overflow-y-auto no-print">
                        <div className="mb-10">
                            <h1 className="text-2xl font-black text-blue-600 italic tracking-tighter">GUDANG<span className="text-gray-800">SMART</span></h1>
                            <p className="text-[10px] text-gray-400 uppercase font-bold tracking-widest mt-1">Sistem Inventaris</p>
                        </div>
                        <nav className="flex-1 space-y-1">
                            <SidebarItem id="dashboard" icon="layout-dashboard" label="Dashboard" />
                            <SidebarItem id="input-manual" icon="settings" label="Pengaturan Master" />
                            <SidebarItem id="master" icon="package" label="Daftar Barang" />
                            <SidebarItem id="pembelian" icon="plus-circle" label="Barang Masuk" />
                            <SidebarItem id="pengeluaran" icon="minus-circle" label="Barang Keluar" />
                            <SidebarItem id="database-transaksi" icon="database" label="Database Transaksi" />
                            <SidebarItem id="riwayat-barang" icon="history" label="Riwayat per Barang" />
                            <SidebarItem id="riwayat-ruangan" icon="map-pin" label="Riwayat per Ruangan" />
                            <SidebarItem id="laporan" icon="file-text" label="Laporan Stok" />
                            <SidebarItem id="tren-harga" icon="trending-up" label="Tren Harga Barang" />
                        </nav>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-6 md:p-10 bg-slate-50">
                        <header className="mb-8 no-print">
                            <h2 className="text-3xl font-bold text-gray-800 capitalize">{activeTab.replace('-', ' ')}</h2>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 no-print">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase">Master Barang</p>
                                        <h4 className="text-3xl font-bold text-blue-600">{masterBarang.length}</h4>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase">Kategori</p>
                                        <h4 className="text-3xl font-bold text-purple-600">{categories.length}</h4>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase">Total Masuk (Rp)</p>
                                        <h4 className="text-2xl font-bold text-emerald-600">{transaksiMasuk.reduce((a, b) => a + (b.jumlah * b.harga), 0).toLocaleString('id-ID')}</h4>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase">Total Keluar (Unit)</p>
                                        <h4 className="text-3xl font-bold text-orange-600">{transaksiKeluar.reduce((a, b) => a + b.jumlah, 0)}</h4>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-gray-100 no-print">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold text-gray-800">Tren Pembelian Tahunan</h3>
                                            <div className="text-[10px] font-black text-gray-400 bg-gray-50 px-3 py-1 rounded-full uppercase">Visualisasi Aliran Dana</div>
                                        </div>
                                        <div className="chart-container">
                                            <canvas id="purchaseChart"></canvas>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                                        <h3 className="font-bold text-gray-800 mb-6">Analisis Anggaran</h3>
                                        <div className="space-y-4">
                                            {budgetAnalysis.map((item, idx) => (
                                                <div key={idx} className="group">
                                                    <div className="flex justify-between items-center mb-1.5">
                                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-wider">{item.kategori}</span>
                                                        <span className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">{item.persen}%</span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 h-2 rounded-full mb-1 overflow-hidden">
                                                        <div 
                                                            className="h-full bg-blue-500 rounded-full transition-all duration-1000 ease-out" 
                                                            style={{ width: `${item.persen}%` }}
                                                        ></div>
                                                    </div>
                                                    <div className="flex justify-between items-baseline">
                                                        <span className="text-xs text-slate-400">{item.totalUnit} Unit</span>
                                                        <span className="text-sm font-bold text-slate-700">Rp {item.totalHarga.toLocaleString('id-ID')}</span>
                                                    </div>
                                                </div>
                                            ))}
                                            {budgetAnalysis.length === 0 && (
                                                <div className="py-10 text-center text-slate-300 italic text-sm">Belum ada data transaksi masuk.</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pembelian' && (
                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                                <form onSubmit={saveMultiMasuk}>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                        <div>
                                            <label className="text-xs font-bold text-gray-400 uppercase mb-2 block">Tanggal Transaksi</label>

                                                            <th className="p-4">Tanggal Pembelian</th>
                                                            <th className="p-4">Harga Satuan</th>
                                                            <th className="p-4">Kenaikan/Penurunan</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {dataTrenHarga.slice().reverse().map((d, idx, arr) => {
                                                            const prev = arr[idx + 1];
                                                            const diff = prev ? d.harga - prev.harga : 0;
                                                            return (
                                                                <tr key={idx} className="border-b hover:bg-slate-50">
                                                                    <td className="p-4 text-sm font-medium">{new Date(d.tanggal).toLocaleDateString('id-ID')}</td>
                                                                    <td className="p-4 font-bold">Rp {d.harga.toLocaleString('id-ID')}</td>
                                                                    <td className="p-4 text-xs font-bold">
                                                                        {diff > 0 && <span className="text-rose-500 flex items-center"><i data-lucide="arrow-up" className="w-3 h-3 mr-1"></i> Rp {diff.toLocaleString('id-ID')}</span>}
                                                                        {diff < 0 && <span className="text-emerald-500 flex items-center"><i data-lucide="arrow-down" className="w-3 h-3 mr-1"></i> Rp {Math.abs(diff).toLocaleString('id-ID')}</span>}
                                                                        {diff === 0 && <span className="text-gray-400">-</span>}
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {activeTab === 'master' && (
                            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="p-6 border-b font-bold text-xl">Master Data Barang</div>
                                <div className="table-container">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="bg-gray-50 text-gray-400 text-[10px] uppercase font-black">
                                                <th className="p-4">Nama Barang</th>
                                                <th className="p-4">Kategori</th>
                                                <th className="p-4 text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {masterBarang.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50 border-b">
                                                    <td className="p-4 font-semibold">{item.nama}</td>
                                                    <td className="p-4"><span className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-xs font-bold">{item.kategori}</span></td>
                                                    <td className="p-4 text-center whitespace-nowrap">
                                                        <button onClick={() => { setEditingItem(item); setEditNameValue(item.nama); }} className="text-gray-400 hover:text-blue-600 p-2 transition-colors mr-2"><i data-lucide="edit-3" className="w-5 h-5"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'input-manual' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-8">
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                        <h3 className="font-bold text-lg mb-4 flex items-center">
                                            <i data-lucide="layers" className="w-5 h-5 mr-2 text-blue-600"></i>
                                            Kelola Kategori
                                        </h3>
                                        <form onSubmit={(e) => {e.preventDefault(); if(newCategory && !categories.includes(newCategory)) {setCategories([...categories, newCategory]); setNewCategory('')}} } className="flex gap-2 mb-6">
                                            <input type="text" value={newCategory} onChange={e => setNewCategory(e.target.value)} required className="flex-1 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Kategori Baru" />
                                            <button type="submit" className="bg-blue-600 text-white px-5 rounded-xl font-bold hover:bg-blue-700 transition-colors">Tambah</button>
                                        </form>
                                        
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-gray-400 uppercase block mb-2 tracking-widest">Daftar Kategori</label>
                                            <div className="grid grid-cols-1 gap-2">
                                                {categories.map(c => (
                                                    <div key={c} className="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100 group">
                                                        <span className="font-medium text-gray-700">{c}</span>
                                                        <button onClick={() => { setEditingCategory(c); setEditCategoryValue(c); }} className="text-gray-400 hover:text-blue-600 p-1 opacity-0 group-hover:opacity-100 transition-all">
                                                            <i data-lucide="edit-2" className="w-4 h-4"></i>
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-3xl border border-dashed border-blue-200 shadow-sm bg-blue-50/20">
                                        <h3 className="font-bold text-lg mb-4 flex items-center text-blue-800">
                                            <i data-lucide="file-up" className="w-5 h-5 mr-2"></i>
                                            Import Cepat via Excel
                                        </h3>
                                        <p className="text-xs text-blue-600 mb-4 bg-blue-50 p-3 rounded-xl">
                                            Unggah file Excel (.xlsx). Pastikan nama barang ada di <b>Kolom A</b>. 
                                            Sistem akan memasukkannya ke kategori yang dipilih di bawah.
                                        </p>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-[10px] font-black text-gray-400 uppercase mb-2 block">Pilih Target Kategori</label>
                                                <select value={importCategory} onChange={e => setImportCategory(e.target.value)} className="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <div className="relative">
                                                <input type="file" accept=".xlsx, .xls" onChange={handleImportExcel} ref={fileInputRef} className="hidden" id="excel-import" />
                                                <label htmlFor="excel-import" className="flex flex-col items-center justify-center border-2 border-dashed border-blue-300 rounded-2xl p-6 hover:bg-blue-100 transition-all cursor-pointer">
                                                    <i data-lucide="upload-cloud" className="w-8 h-8 text-blue-500 mb-2"></i>
                                                    <span className="text-sm font-bold text-blue-600">Klik untuk Unggah Excel</span>
                                                    <span className="text-[10px] text-gray-400 mt-1 italic">Satu Nama Barang per Baris</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                    <h3 className="font-bold text-lg mb-4 flex items-center">
                                        <i data-lucide="plus-square" className="w-5 h-5 mr-2 text-green-600"></i>
                                        Tambah Master Satuan
                                    </h3>
                                    <form onSubmit={(e) => {e.preventDefault(); if(formMaster.nama) {setMasterBarang([...masterBarang, {id: Date.now(), ...formMaster}]); setFormMaster({nama:'', kategori:categories[0]})}} } className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase mb-2 block">Nama Barang</label>
                                            <input type="text" value={formMaster.nama} onChange={e => setFormMaster({...formMaster, nama: e.target.value})} required className="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Contoh: Pulpen Kenko" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase mb-2 block">Kategori</label>
                                            <select value={formMaster.kategori} onChange={e => setFormMaster({...formMaster, kategori: e.target.value})} className="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-green-500">
                                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <button type="submit" className="w-full bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition-all shadow-md mt-4">Simpan Ke Master Data</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Modals */}
                        {editingItem && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay no-print">
                                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 animate-in fade-in zoom-in duration-200">
                                    <h3 className="text-xl font-bold mb-6">Ubah Nama Barang</h3>
                                    <input type="text" value={editNameValue} onChange={(e) => setEditNameValue(e.target.value)} className="w-full border-2 border-blue-100 rounded-2xl p-4 text-lg font-medium mb-6 outline-none focus:border-blue-500" />
                                    <div className="flex gap-3">
                                        <button onClick={() => setEditingItem(null)} className="flex-1 py-3 rounded-2xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors">Batal</button>
                                        <button onClick={handleUpdateItem} className="flex-1 py-3 rounded-2xl font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-lg">Simpan</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {editingCategory && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay no-print">
                                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 animate-in fade-in zoom-in duration-200">
                                    <h3 className="text-xl font-bold mb-2">Ubah Nama Kategori</h3>
                                    <p className="text-xs text-rose-500 mb-6 font-medium">*Mengubah nama kategori akan memperbarui semua data barang dan riwayat terkait.</p>
                                    <input type="text" value={editCategoryValue} onChange={(e) => setEditCategoryValue(e.target.value)} className="w-full border-2 border-purple-100 rounded-2xl p-4 text-lg font-medium mb-6 outline-none focus:border-purple-500" />
                                    <div className="flex gap-3">
                                        <button onClick={() => setEditingCategory(null)} className="flex-1 py-3 rounded-2xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors">Batal</button>
                                        <button onClick={handleUpdateCategory} className="flex-1 py-3 rounded-2xl font-bold text-white bg-purple-600 hover:bg-purple-700 transition-colors shadow-lg">Simpan</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {editingTransaksi && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay no-print">
                                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-8 animate-in fade-in zoom-in duration-200">
                                    <h3 className="text-xl font-bold mb-6 flex items-center">
                                        <i data-lucide="edit-2" className="w-5 h-5 mr-2 text-blue-600"></i>
                                        Edit Transaksi {editingTransaksi.tipe}
                                    </h3>
                                    <form onSubmit={handleUpdateTransaksi} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Tanggal</label>
                                                <input type="date" value={editingTransaksi.tanggal} onChange={e => setEditingTransaksi({...editingTransaksi, tanggal: e.target.value})} className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Jumlah</label>
                                                <input type="number" value={editingTransaksi.jumlah} onChange={e => setEditingTransaksi({...editingTransaksi, jumlah: Number(e.target.value)})} className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 uppercase mb-1 block">{editingTransaksi.tipe === 'MASUK' ? 'Vendor / Supplier' : 'Tujuan / Ruangan'}</label>
                                            <input type="text" value={editingTransaksi.tipe === 'MASUK' ? (editingTransaksi.vendor || '') : (editingTransaksi.tujuan || '')} 
                                                onChange={e => {
                                                    const key = editingTransaksi.tipe === 'MASUK' ? 'vendor' : 'tujuan';
                                                    setEditingTransaksi({...editingTransaksi, [key]: e.target.value});
                                                }} 
                                                className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required />
                                        </div>
                                        {editingTransaksi.tipe === 'MASUK' && (
                                            <div>
                                                <label className="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Harga Satuan (Rp)</label>
                                                <input type="number" value={editingTransaksi.harga || 0} onChange={e => setEditingTransaksi({...editingTransaksi, harga: Number(e.target.value)})} className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                        )}
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setEditingTransaksi(null)} className="flex-1 py-3 rounded-2xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors">Batal</button>
                                            <button type="submit" className="flex-1 py-3 rounded-2xl font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-lg">Simpan Perubahan</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
