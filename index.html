<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GudangCloud Pro - Sistem Logistik Terintegrasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .active-tab { background: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 no-print">
        <div class="p-6 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="box" class="w-6 h-6"></i>
                </div>
                <span class="font-black text-xl tracking-tighter">GudangCloud</span>
            </div>
        </div>
        
        <nav class="flex-1 overflow-y-auto custom-scroll p-4 space-y-1">
            <p class="text-[10px] font-black text-slate-400 uppercase px-3 py-2">Menu Utama</p>
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
            </button>
            <button onclick="switchTab('master')" id="btn-master" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="database" class="w-4 h-4"></i> Master Barang
            </button>

            <p class="text-[10px] font-black text-slate-400 uppercase px-3 py-2 mt-4">Transaksi</p>
            <button onclick="switchTab('in')" id="btn-in" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="log-in" class="w-4 h-4 text-emerald-500"></i> Barang Masuk
            </button>
            <button onclick="switchTab('out')" id="btn-out" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="log-out" class="w-4 h-4 text-orange-500"></i> Barang Keluar
            </button>

            <p class="text-[10px] font-black text-slate-400 uppercase px-3 py-2 mt-4">Analisa & Laporan</p>
            <button onclick="switchTab('history_item')" id="btn-history_item" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="search" class="w-4 h-4"></i> Riwayat per Barang
            </button>
            <button onclick="switchTab('history_unit')" id="btn-history_unit" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="home" class="w-4 h-4"></i> Riwayat per Ruangan
            </button>
            <button onclick="switchTab('stock')" id="btn-stock" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="file-text" class="w-4 h-4"></i> Laporan Stok
            </button>
            <button onclick="switchTab('trend')" id="btn-trend" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold transition-all hover:bg-slate-50">
                <i data-lucide="trending-up" class="w-4 h-4"></i> Tren Barang
            </button>
        </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 no-print">
            <h2 id="tab-title" class="font-extrabold text-lg">Dashboard</h2>
            <div id="auth-status" class="text-xs font-bold text-slate-400 italic tracking-tight">Menunggu Autentikasi...</div>
        </header>

        <section id="content-area" class="flex-1 overflow-y-auto p-8 custom-scroll bg-slate-50/50">
            <div class="flex flex-col items-center justify-center h-full text-slate-400">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4"></i>
                <p class="font-bold">Inisialisasi Sistem Cloud...</p>
            </div>
        </section>
    </main>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4 no-print">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gudang-standard';

        // Global State
        let items = [];
        let transactions = [];
        let currentTab = 'dashboard';
        let currentUser = null;
        let selectedYear = new Date().getFullYear();
        let dashboardChartInstance = null;
        const categories = ["ATK", "Plastik", "PHP", "Elektronik", "Lainnya"];

        // UI Core
        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            const activeBtn = document.getElementById(`btn-${tab}`);
            if(activeBtn) {
                activeBtn.classList.add('active-tab');
                document.getElementById('tab-title').innerText = activeBtn.innerText;
            }
            renderContent();
        };

        // Authentication & Initialization
        window.addEventListener('load', async () => {
            lucide.createIcons();
            
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth Error:", error);
                    document.getElementById('auth-status').innerText = "Gagal Login ke Cloud";
                    document.getElementById('auth-status').classList.add('text-red-500');
                }
            };

            await initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    document.getElementById('auth-status').innerText = `Terhubung: ${user.uid.substring(0,8)}...`;
                    document.getElementById('auth-status').classList.remove('text-red-500');
                    setupDataListeners();
                }
            });
        });

        function setupDataListeners() {
            if (!currentUser) return;

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'items'), 
                (snap) => {
                    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderContent();
                }, 
                (err) => console.error(err)
            );

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), 
                (snap) => {
                    transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderContent();
                }, 
                (err) => console.error(err)
            );
        }

        // --- CALCULATION LOGIC ---
        function calculateStock(itemId) {
            let stock = 0;
            transactions.forEach(t => {
                (t.items || []).forEach(it => {
                    if(it.itemId === itemId) {
                        if(t.type === 'in') stock += it.qty;
                        if(t.type === 'out') stock -= it.qty;
                    }
                });
            });
            return stock;
        }

        function getItemStats(itemId) {
            let tin = 0;
            let tout = 0;
            transactions.forEach(t => {
                (t.items || []).forEach(it => {
                    if(it.itemId === itemId) {
                        if(t.type === 'in') tin += it.qty;
                        if(t.type === 'out') tout += it.qty;
                    }
                });
            });
            return { in: tin, out: tout };
        }

        // --- RENDERER ---
        function renderContent() {
            const container = document.getElementById('content-area');
            if (!container) return;

            switch(currentTab) {
                case 'dashboard': renderDashboard(container); break;
                case 'master': renderMaster(container); break;
                case 'in': renderTransactionForm(container, 'in'); break;
                case 'out': renderTransactionForm(container, 'out'); break;
                case 'history_item': renderHistoryItem(container); break;
                case 'history_unit': renderHistoryUnit(container); break;
                case 'stock': renderStockReport(container); break;
                case 'trend': renderTrend(container); break;
            }
            lucide.createIcons();
        }

        function renderDashboard(container) {
            const totalStock = items.reduce((acc, item) => acc + calculateStock(item.id), 0);
            
            const years = [...new Set(transactions.map(t => new Date(t.date).getFullYear()))].sort((a,b) => b-a);
            if (!years.includes(selectedYear)) {
                if (years.length > 0) selectedYear = years[0];
            }

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total SKU Barang</p>
                        <h3 class="text-3xl font-black mt-1">${items.length}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Unit Stok</p>
                        <h3 class="text-3xl font-black mt-1 text-blue-600">${totalStock}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Transaksi Masuk</p>
                        <h3 class="text-3xl font-black mt-1 text-emerald-500">${transactions.filter(t => t.type === 'in').length}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Transaksi Keluar</p>
                        <h3 class="text-3xl font-black mt-1 text-orange-500">${transactions.filter(t => t.type === 'out').length}</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6 mb-8">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-center mb-10">
                            <div>
                                <h4 class="text-lg font-black text-slate-800">Tren Pembelian Bulanan</h4>
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Berdasarkan Kategori Pilihan</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="hidden md:flex gap-4">
                                    <div class="flex items-center gap-2 text-[10px] font-bold text-blue-600"><span class="w-3 h-0.5 bg-blue-600"></span> Elektronik</div>
                                    <div class="flex items-center gap-2 text-[10px] font-bold text-purple-600"><span class="w-3 h-0.5 border-t-2 border-dashed border-purple-600"></span> Alat Kantor</div>
                                    <div class="flex items-center gap-2 text-[10px] font-bold text-orange-500"><span class="w-3 h-0.5 bg-orange-500 opacity-60"></span> Furniture</div>
                                </div>
                                <select id="yearSelector" class="bg-slate-50 border border-slate-200 text-xs font-black px-3 py-2 rounded-xl outline-none focus:ring-2 ring-blue-100">
                                    ${years.length ? years.map(y => `<option value="${y}" ${y == selectedYear ? 'selected' : ''}>Tahun ${y}</option>`).join('') : `<option>${new Date().getFullYear()}</option>`}
                                </select>
                            </div>
                        </div>
                        <div class="h-80 relative">
                            <canvas id="dashboardTrendChart"></canvas>
                        </div>
                        <div class="mt-8 pt-4 border-t border-slate-50 text-center">
                             <p class="text-[11px] font-black text-slate-600 uppercase tracking-[0.2em]" id="sumbuXLabel">Tahun Pembelian ${selectedYear}</p>
                        </div>

                        <!-- Budget/Anggaran Stats Display -->
                        <div id="budgetStatsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8 pt-6 border-t border-slate-100">
                             <!-- Konten dinamis anggaran per kategori -->
                        </div>
                    </div>
                </div>
            `;

            initDashboardChart();
            updateBudgetStats();
            
            document.getElementById('yearSelector').addEventListener('change', (e) => {
                selectedYear = parseInt(e.target.value);
                updateDashboardChart();
                updateBudgetStats();
                document.getElementById('sumbuXLabel').innerText = `Tahun Pembelian ${selectedYear}`;
            });
        }

        function initDashboardChart() {
            const canvas = document.getElementById('dashboardTrendChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const data = getChartDataForYear(selectedYear);
            
            dashboardChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"],
                    datasets: [
                        {
                            label: 'Elektronik',
                            data: data.elektronik,
                            borderColor: '#2563eb',
                            borderWidth: 3,
                            pointBackgroundColor: '#2563eb',
                            pointRadius: 4,
                            tension: 0.4,
                            fill: false
                        },
                        {
                            label: 'Alat Kantor',
                            data: data.atk,
                            borderColor: '#9333ea',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointBackgroundColor: '#9333ea',
                            pointRadius: 4,
                            tension: 0.4,
                            fill: false
                        },
                        {
                            label: 'Furniture',
                            data: data.furniture,
                            borderColor: '#f97316',
                            borderWidth: 1.2,
                            pointBackgroundColor: '#f97316',
                            pointRadius: 3,
                            tension: 0.4,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 12 },
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { borderDash: [5, 5], color: '#f1f5f9' },
                            ticks: { font: { weight: '600' }, color: '#94a3b8' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { font: { weight: '700' }, color: '#475569' }
                        }
                    }
                }
            });
        }

        function getChartDataForYear(year) {
            const data = {
                elektronik: new Array(12).fill(0),
                atk: new Array(12).fill(0),
                furniture: new Array(12).fill(0)
            };

            transactions.filter(t => t.type === 'in' && new Date(t.date).getFullYear() === year).forEach(t => {
                const monthIdx = new Date(t.date).getMonth();
                (t.items || []).forEach(it => {
                    if (it.category === "Elektronik") data.elektronik[monthIdx] += it.qty;
                    else if (it.category === "ATK") data.atk[monthIdx] += it.qty;
                    else if (it.category === "Lainnya" || it.category === "Plastik") data.furniture[monthIdx] += it.qty;
                });
            });
            return data;
        }

        function getBudgetDataForYear(year) {
            const budget = { elektronik: 0, atk: 0, furniture: 0 };
            
            transactions.filter(t => t.type === 'in' && new Date(t.date).getFullYear() === year).forEach(t => {
                (t.items || []).forEach(it => {
                    const lineTotal = (it.qty || 0) * (it.price || 0);
                    if (it.category === "Elektronik") budget.elektronik += lineTotal;
                    else if (it.category === "ATK") budget.atk += lineTotal;
                    else if (it.category === "Lainnya" || it.category === "Plastik") budget.furniture += lineTotal;
                });
            });
            return budget;
        }

        function updateDashboardChart() {
            if (!dashboardChartInstance) return;
            const newData = getChartDataForYear(selectedYear);
            dashboardChartInstance.data.datasets[0].data = newData.elektronik;
            dashboardChartInstance.data.datasets[1].data = newData.atk;
            dashboardChartInstance.data.datasets[2].data = newData.furniture;
            dashboardChartInstance.update();
        }

        function updateBudgetStats() {
            const container = document.getElementById('budgetStatsGrid');
            if(!container) return;
            
            const budget = getBudgetDataForYear(selectedYear);
            const grandTotal = budget.elektronik + budget.atk + budget.furniture;
            
            const calcPerc = (val) => grandTotal > 0 ? ((val / grandTotal) * 100).toFixed(1) : 0;
            const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);

            const cats = [
                { name: 'Elektronik', total: budget.elektronik, perc: calcPerc(budget.elektronik), color: 'text-blue-600', bg: 'bg-blue-50' },
                { name: 'Alat Kantor', total: budget.atk, perc: calcPerc(budget.atk), color: 'text-purple-600', bg: 'bg-purple-50' },
                { name: 'Furniture', total: budget.furniture, perc: calcPerc(budget.furniture), color: 'text-orange-500', bg: 'bg-orange-50' }
            ];

            container.innerHTML = cats.map(c => `
                <div class="${c.bg} p-4 rounded-2xl flex flex-col items-center text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Anggaran ${c.name}</p>
                    <h4 class="text-base font-black ${c.color}">${formatIDR(c.total)}</h4>
                    <div class="mt-2 px-3 py-1 bg-white/50 rounded-full text-[10px] font-bold text-slate-600 border border-white">
                        ${c.perc}% dari Total Belanja
                    </div>
                </div>
            `).join('');
        }

        // --- MASTER DATA & OTHER RENDERERS ---
        function renderMaster(container) {
            container.innerHTML = `
                <div class="flex justify-between items-center mb-6 no-print">
                    <div class="flex gap-2">
                        <button onclick="window.openAddModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-blue-700 transition-all">
                            <i data-lucide="plus" class="w-4 h-4"></i> Tambah Manual
                        </button>
                        <label class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700 cursor-pointer transition-all">
                            <i data-lucide="file-up" class="w-4 h-4"></i> Impor Excel
                            <input type="file" id="excel-import" class="hidden" accept=".xlsx, .xls">
                        </label>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4">Nama Barang</th>
                                <th class="px-6 py-4">Edit Kategori</th>
                                <th class="px-6 py-4 text-right no-print">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${items.length === 0 ? '<tr><td colspan="4" class="p-10 text-center text-slate-400 italic">Belum ada data barang. Silakan tambah atau impor.</td></tr>' : items.map(i => `
                                <tr class="hover:bg-slate-50 transition-all">
                                    <td class="px-6 py-4"><span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-bold uppercase">${i.category}</span></td>
                                    <td class="px-6 py-4 font-bold text-slate-700 text-sm">${i.name}</td>
                                    <td class="px-6 py-4">
                                        <select onchange="window.updateItemCategory('${i.id}', this.value)" class="bg-white border border-slate-200 p-1 rounded-lg text-[11px] font-bold outline-none focus:ring-1 ring-blue-500">
                                            ${categories.map(c => `<option value="${c}" ${i.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                                        </select>
                                    </td>
                                    <td class="px-6 py-4 text-right flex justify-end gap-1 no-print">
                                        <button onclick="window.openEditModal('${i.id}')" class="p-2 text-slate-300 hover:text-blue-500"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                                        <button onclick="window.deleteItem('${i.id}')" class="p-2 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            const importEl = document.getElementById('excel-import');
            if(importEl) importEl.addEventListener('change', handleExcelImport);
            lucide.createIcons();
        }

        async function handleExcelImport(e) {
            const file = e.target.files[0];
            if(!file || !currentUser) return;
            const reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws);
                    
                    for(let row of data) {
                        const name = row.Nama || row.name || row["Nama Barang"];
                        const cat = row.Kategori || row.category || row["Kategori Barang"];
                        if(name && cat) {
                            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'items'), {
                                name, category: cat, createdAt: new Date().toISOString()
                            });
                        }
                    }
                    alert("Impor Excel Berhasil!");
                } catch(err) {
                    console.error("Excel Error:", err);
                    alert("Gagal membaca file Excel.");
                }
            };
            reader.readAsBinaryString(file);
        }

        function renderTransactionForm(container, type) {
            container.innerHTML = `
                <div class="max-w-4xl mx-auto bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden">
                    <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <div>
                            <h3 class="text-xl font-black">${type === 'in' ? 'Barang Masuk / Pembelian' : 'Barang Keluar / Distribusi'}</h3>
                            <p class="text-xs text-slate-400">Catat transaksi logistik baru</p>
                        </div>
                        <div class="text-right">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Tanggal</label>
                            <input type="date" id="trans-date" value="${new Date().toISOString().split('T')[0]}" class="bg-transparent font-bold text-sm outline-none">
                        </div>
                    </div>
                    <div class="p-8 space-y-6">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">${type === 'in' ? 'Vendor / Supplier' : 'Tujuan / Unit Kerja'}</label>
                            <input type="text" id="trans-ref" placeholder="${type === 'in' ? 'Contoh: PT Sumber Rejeki' : 'Contoh: Ruang Poli Umum'}" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl outline-none focus:ring-2 ring-blue-100 transition-all font-bold text-sm">
                        </div>
                        <div class="border-t border-slate-100 pt-6">
                            <div class="flex justify-between items-center mb-4">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Detail Barang</label>
                                <button onclick="window.addRow('${type}')" class="text-blue-600 text-xs font-bold flex items-center gap-1 hover:underline">
                                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Tambah Baris
                                </button>
                            </div>
                            <div id="items-rows" class="space-y-3"></div>
                        </div>
                        <div class="pt-6">
                            <button onclick="window.saveTransaction('${type}')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg shadow-slate-200 hover:bg-black transition-all">SIMPAN TRANSAKSI</button>
                        </div>
                    </div>
                </div>
            `;
            window.addRow(type);
        }

        window.addRow = (type) => {
            const container = document.getElementById('items-rows');
            if(!container) return;
            const rowId = Date.now();
            const row = document.createElement('div');
            row.className = "flex flex-wrap md:flex-nowrap gap-3 items-end bg-slate-50/50 p-4 rounded-xl border border-slate-100 group animate-in fade-in slide-in-from-top-2";
            row.id = `row-${rowId}`;
            row.innerHTML = `
                <div class="w-full md:w-1/4">
                    <label class="block text-[8px] font-black text-slate-400 uppercase mb-1">Kategori</label>
                    <select onchange="window.updateRowItems('${rowId}')" class="row-cat w-full bg-white border border-slate-200 p-2 rounded-lg text-xs font-bold outline-none">
                        <option value="">Pilih...</option>
                        ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                    </select>
                </div>
                <div class="w-full md:flex-1">
                    <label class="block text-[8px] font-black text-slate-400 uppercase mb-1">Barang</label>
                    <select class="row-item w-full bg-white border border-slate-200 p-2 rounded-lg text-xs font-bold outline-none">
                        <option value="">Pilih Kategori Dulu...</option>
                    </select>
                </div>
                <div class="w-24">
                    <label class="block text-[8px] font-black text-slate-400 uppercase mb-1">Jumlah</label>
                    <input type="number" class="row-qty w-full bg-white border border-slate-200 p-2 rounded-lg text-xs font-bold outline-none" value="1" min="1">
                </div>
                ${type === 'in' ? `
                <div class="w-32">
                    <label class="block text-[8px] font-black text-slate-400 uppercase mb-1">Harga Satuan</label>
                    <input type="number" class="row-price w-full bg-white border border-slate-200 p-2 rounded-lg text-xs font-bold outline-none" placeholder="0">
                </div>` : ''}
                <button onclick="document.getElementById('row-${rowId}').remove()" class="p-2 text-slate-300 hover:text-red-500 mb-0.5">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(row);
            lucide.createIcons();
        };

        window.updateRowItems = (rowId) => {
            const row = document.getElementById(`row-${rowId}`);
            const cat = row.querySelector('.row-cat').value;
            const sel = row.querySelector('.row-item');
            const filtered = items.filter(i => i.category === cat);
            sel.innerHTML = '<option value="">Pilih Barang...</option>' + 
                filtered.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
        };

        window.saveTransaction = async (type) => {
            if(!currentUser) return;
            const date = document.getElementById('trans-date').value;
            const ref = document.getElementById('trans-ref').value;
            const rows = document.querySelectorAll('#items-rows > div');
            
            const transItems = Array.from(rows).map(row => ({
                itemId: row.querySelector('.row-item').value,
                qty: parseInt(row.querySelector('.row-qty').value) || 0,
                price: type === 'in' ? (parseInt(row.querySelector('.row-price')?.value) || 0) : 0,
                category: row.querySelector('.row-cat').value
            }));

            if(!ref || transItems.some(i => !i.itemId || i.qty <= 0)) {
                alert("Mohon lengkapi semua data barang!");
                return;
            }

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                    type, date, ref, items: transItems, timestamp: new Date().toISOString()
                });
                alert("Transaksi Berhasil!");
                window.switchTab('dashboard');
            } catch(e) { console.error(e); }
        };

        function renderHistoryItem(container) {
            container.innerHTML = `
                <div class="bg-white p-6 rounded-2xl border border-slate-200 mb-8 shadow-sm no-print">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Kategori</label>
                            <select id="hist-cat" onchange="window.updateHistItems()" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                                <option value="">Semua Kategori</option>
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Pilih Barang</label>
                            <select id="hist-item" onchange="window.renderHistResults()" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                                <option value="">Pilih Barang...</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="hist-results"></div>
            `;
        }

        window.updateHistItems = () => {
            const cat = document.getElementById('hist-cat').value;
            const sel = document.getElementById('hist-item');
            const filtered = cat ? items.filter(i => i.category === cat) : items;
            sel.innerHTML = '<option value="">Pilih Barang...</option>' + filtered.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            window.renderHistResults();
        };

        window.renderHistResults = () => {
            const itemId = document.getElementById('hist-item').value;
            const res = document.getElementById('hist-results');
            if(!itemId) { res.innerHTML = ''; return; }

            const filtered = transactions.filter(t => t.items.some(it => it.itemId === itemId))
                                        .sort((a,b) => new Date(b.date) - new Date(a.date));

            res.innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                <th class="px-6 py-4">Tanggal</th>
                                <th class="px-6 py-4">Jenis</th>
                                <th class="px-6 py-4">Keterangan</th>
                                <th class="px-6 py-4 text-right">Qty</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${filtered.map(t => {
                                const row = t.items.find(it => it.itemId === itemId);
                                return `<tr>
                                    <td class="px-6 py-4 font-bold text-slate-500">${t.date}</td>
                                    <td class="px-6 py-4"><span class="px-2 py-1 rounded text-[10px] font-black uppercase ${t.type === 'in' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'}">${t.type}</span></td>
                                    <td class="px-6 py-4 font-bold text-slate-700">${t.ref}</td>
                                    <td class="px-6 py-4 text-right font-black">${row.qty}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        };

        function renderHistoryUnit(container) {
            const units = [...new Set(transactions.filter(t => t.type === 'out').map(t => t.ref))].sort();
            container.innerHTML = `
                <div class="bg-white p-6 rounded-2xl border border-slate-200 mb-8 shadow-sm no-print">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Pilih Ruangan / Unit</label>
                    <select id="unit-sel" onchange="window.renderUnitResults()" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                        <option value="">Pilih Unit...</option>
                        ${units.map(u => `<option value="${u}">${u}</option>`).join('')}
                    </select>
                </div>
                <div id="unit-results"></div>
            `;
        }

        window.renderUnitResults = () => {
            const unit = document.getElementById('unit-sel').value;
            const res = document.getElementById('unit-results');
            if(!unit) { res.innerHTML = ''; return; }
            const filtered = transactions.filter(t => t.type === 'out' && t.ref === unit);
            res.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${filtered.map(t => `<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-50 pb-2">
                        <span class="font-black text-sm text-slate-800">${t.date}</span>
                    </div>
                    <div class="space-y-2">
                        ${t.items.map(it => `<div class="flex justify-between text-sm">
                            <span class="text-slate-600">${items.find(i => i.id === it.itemId)?.name || 'Deleted'}</span>
                            <span class="font-black">${it.qty} Unit</span>
                        </div>`).join('')}
                    </div>
                </div>`).join('')}
            </div>`;
        };

        function renderStockReport(container) {
            container.innerHTML = `
                <div class="flex justify-end gap-3 mb-6 no-print">
                    <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                        <i data-lucide="printer" class="w-4 h-4"></i> Cetak PDF
                    </button>
                </div>
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                <th class="px-6 py-4">Barang</th>
                                <th class="px-6 py-4 text-right">Masuk</th>
                                <th class="px-6 py-4 text-right">Keluar</th>
                                <th class="px-6 py-4 text-right">Sisa Stok</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${items.map(item => {
                                const s = getItemStats(item.id);
                                return `<tr>
                                    <td class="px-6 py-4 font-bold text-slate-700">${item.name} <br> <span class="text-[10px] text-slate-400 font-normal uppercase tracking-wider">${item.category}</span></td>
                                    <td class="px-6 py-4 text-right font-bold text-emerald-600">${s.in}</td>
                                    <td class="px-6 py-4 text-right font-bold text-orange-600">${s.out}</td>
                                    <td class="px-6 py-4 text-right font-black text-blue-600 text-lg">${s.in - s.out}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderTrend(container) {
            container.innerHTML = `
                <div class="bg-white p-6 rounded-2xl border border-slate-200 mb-8 shadow-sm no-print">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Kategori</label>
                            <select id="trend-cat" onchange="window.updateTrendItems()" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                                <option value="">Semua Kategori</option>
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Analisa Barang</label>
                            <select id="trend-item" onchange="window.renderTrendChart()" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                                <option value="">Pilih Barang...</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="trend-res"></div>
            `;
        }

        window.updateTrendItems = () => {
            const cat = document.getElementById('trend-cat').value;
            const sel = document.getElementById('trend-item');
            const filtered = cat ? items.filter(i => i.category === cat) : items;
            sel.innerHTML = '<option value="">Pilih Barang...</option>' + filtered.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            window.renderTrendChart();
        };

        window.renderTrendChart = () => {
            const itemId = document.getElementById('trend-item').value;
            const res = document.getElementById('trend-res');
            if(!itemId) { res.innerHTML = ''; return; }

            const pricesData = [];
            transactions.filter(t => t.type === 'in').forEach(t => {
                const it = t.items.find(row => row.itemId === itemId);
                if(it) pricesData.push({ date: t.date, price: it.price });
            });
            pricesData.sort((a,b) => new Date(a.date) - new Date(b.date));

            const prices = pricesData.map(p => p.price);
            const max = prices.length ? Math.max(...prices) : 0;
            const min = prices.length ? Math.min(...prices) : 0;

            res.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Harga Tertinggi</p>
                        <h3 class="text-2xl font-black mt-1 text-red-500">Rp ${max.toLocaleString()}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Harga Terendah</p>
                        <h3 class="text-2xl font-black mt-1 text-emerald-500">Rp ${min.toLocaleString()}</h3>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                    <canvas id="priceChart" class="w-full h-64"></canvas>
                </div>
            `;

            if(pricesData.length) {
                new Chart(document.getElementById('priceChart'), {
                    type: 'line',
                    data: {
                        labels: pricesData.map(p => p.date),
                        datasets: [{
                            data: pricesData.map(p => p.price),
                            borderColor: '#2563eb',
                            tension: 0.3,
                            fill: true,
                            backgroundColor: 'rgba(37, 99, 235, 0.05)'
                        }]
                    },
                    options: { plugins: { legend: { display: false } } }
                });
            }
        };

        // --- MASTER DATA ACTIONS ---
        window.openAddModal = () => {
            const modal = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="p-8">
                    <h3 class="text-xl font-black mb-6">Tambah Barang Manual</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nama Barang</label>
                            <input type="text" id="add-name" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Kategori</label>
                            <select id="add-cat" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-8">
                        <button onclick="window.closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs uppercase">Batal</button>
                        <button onclick="window.addItem()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase">Simpan</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        window.openEditModal = (id) => {
            const item = items.find(i => i.id === id);
            if(!item) return;
            const modal = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="p-8">
                    <h3 class="text-xl font-black mb-6">Edit Data Barang</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nama Barang</label>
                            <input type="text" id="edit-name" value="${item.name}" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Kategori</label>
                            <select id="edit-cat" class="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl font-bold text-sm outline-none">
                                ${categories.map(c => `<option value="${c}" ${item.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-8">
                        <button onclick="window.closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs uppercase">Batal</button>
                        <button onclick="window.updateItem('${id}')" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase">Simpan Perubahan</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');

        window.addItem = async () => {
            if(!currentUser) return;
            const name = document.getElementById('add-name').value;
            const cat = document.getElementById('add-cat').value;
            if(!name) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'items'), {
                name, category: cat, createdAt: new Date().toISOString()
            });
            window.closeModal();
        };

        window.updateItem = async (id) => {
            if(!currentUser) return;
            const name = document.getElementById('edit-name').value;
            const cat = document.getElementById('edit-cat').value;
            if(!name) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', id), {
                name, category: cat
            });
            window.closeModal();
        };

        window.updateItemCategory = async (id, newCat) => {
            if(!currentUser) return;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', id), {
                    category: newCat
                });
            } catch (e) { console.error(e); }
        };

        window.deleteItem = async (id) => {
            if(!currentUser) return;
            if(confirm("Hapus barang ini secara permanen?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', id));
            }
        };

    </script>
</body>
</html>
